name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: CI
    uses: ./.github/workflows/ci.yml

  terraform-prod:
    name: Terraform apply (prod)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_auth0_domain: ${{ secrets.AUTH0_PROD_DOMAIN }}
      TF_VAR_auth0_client_id: ${{ secrets.AUTH0_PROD_TF_CLIENT_ID }}
      TF_VAR_auth0_client_secret: ${{ secrets.AUTH0_PROD_TF_CLIENT_SECRET }}
      TF_VAR_vercel_api_token: ${{ secrets.VERCEL_TOKEN }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
      TF_VAR_auth0_audience: ${{ secrets.AUTH0_AUDIENCE_PROD }}
      TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      TF_VAR_google_ads_client_id: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      TF_VAR_google_ads_client_secret: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      TF_VAR_google_ads_developer_token: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      TF_VAR_meta_app_id: ${{ secrets.META_APP_ID }}
      TF_VAR_meta_app_secret: ${{ secrets.META_APP_SECRET }}
      TF_VAR_xai_api_key: ${{ secrets.XAI_API_KEY }}
      TF_VAR_google_ai_api_key: ${{ secrets.GOOGLE_AI_API_KEY }}
      TF_VAR_session_secret: ${{ secrets.SESSION_SECRET_PROD }}
      TF_VAR_auth0_log_stream_token: ${{ secrets.AUTH0_LOG_STREAM_TOKEN_PROD }}
      TF_VAR_vercel_domain: ${{ secrets.VERCEL_DOMAIN_PROD }}
      TF_VAR_environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Prepare prod.tfvars
        working-directory: infra
        run: cp envs/prod.tfvars.example envs/prod.tfvars

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars

  deploy-prod:
    name: Vercel production deploy
    needs: terraform-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings (production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (production)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production (prebuilt)
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
