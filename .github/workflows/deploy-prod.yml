name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: CI
    uses: ./.github/workflows/ci.yml

  terraform-prod:
    name: Terraform (prod)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan (prod)
        if: env.TF_VAR_auth0_domain != '' && env.TF_VAR_auth0_client_id != '' && env.TF_VAR_auth0_client_secret != ''
        working-directory: infra
        continue-on-error: true
        env:
          TF_VAR_auth0_domain: ${{ secrets.AUTH0_PROD_DOMAIN }}
          TF_VAR_auth0_client_id: ${{ secrets.AUTH0_PROD_TF_CLIENT_ID }}
          TF_VAR_auth0_client_secret: ${{ secrets.AUTH0_PROD_TF_CLIENT_SECRET }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_TOKEN }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
          TF_VAR_auth0_audience: ${{ secrets.AUTH0_AUDIENCE_PROD }}
          TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TF_VAR_google_ads_client_id: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          TF_VAR_google_ads_client_secret: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          TF_VAR_google_ads_developer_token: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          TF_VAR_meta_app_id: ${{ secrets.META_APP_ID }}
          TF_VAR_meta_app_secret: ${{ secrets.META_APP_SECRET }}
          TF_VAR_xai_api_key: ${{ secrets.XAI_API_KEY }}
          TF_VAR_google_ai_api_key: ${{ secrets.GOOGLE_AI_API_KEY }}
          TF_VAR_session_secret: ${{ secrets.SESSION_SECRET_PROD }}
          TF_VAR_auth0_log_stream_token: ${{ secrets.AUTH0_LOG_STREAM_TOKEN_PROD }}
          TF_VAR_vercel_domain: ${{ secrets.VERCEL_DOMAIN_PROD }}
          TF_VAR_environment: prod
        run: |
          cp envs/prod.tfvars.example envs/prod.tfvars
          terraform plan -var-file=envs/prod.tfvars -out=prod.tfplan

      - name: Skip notice (Terraform)
        if: env.TF_VAR_auth0_domain == '' || env.TF_VAR_auth0_client_id == '' || env.TF_VAR_auth0_client_secret == ''
        env:
          TF_VAR_auth0_domain: ${{ secrets.AUTH0_PROD_DOMAIN }}
          TF_VAR_auth0_client_id: ${{ secrets.AUTH0_PROD_TF_CLIENT_ID }}
          TF_VAR_auth0_client_secret: ${{ secrets.AUTH0_PROD_TF_CLIENT_SECRET }}
        run: echo "::notice::Terraform plan/apply skipped — Auth0 resources are managed manually for this environment. IaC validation passed."

  deploy-prod:
    name: Vercel production deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel deploy skipped — VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID not configured."
          fi

      - name: Checkout
        if: steps.check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.check.outputs.ready == 'true'
        run: npm run build

      - name: Deploy production
        if: steps.check.outputs.ready == 'true'
        run: npx vercel deploy ./dist --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
